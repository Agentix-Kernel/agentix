<circle cx="490" cy="321" r="14" fill="#42a5f5"/>
<text x="490" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">6</text>
<rect x="530" y="302" width="430" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<text x="542" y="316" font-size="11" font-weight="bold" fill="#1565c0">Odoo RPC clients (source + target)</text>
<text x="542" y="329" font-size="10" fill="#1565c0">Filled per session; kernel never inspects</text>

<!-- ═══ ROW 7 — Sandbox (#7, blue) y=348 ═══ -->
<rect x="20" y="348" width="430" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<text x="32" y="362" font-size="11" font-weight="bold" fill="#1565c0">Sandbox allowlists + agent identity</text>
