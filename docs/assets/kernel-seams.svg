<circle cx="490" cy="551" r="14" fill="#66bb6a"/>
<text x="490" y="555" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">11</text>
<rect x="530" y="532" width="430" height="38" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
<text x="542" y="546" font-size="11" font-weight="bold" fill="#2e7d32">NATS JetStream forwarder</text>
<text x="542" y="559" font-size="10" fill="#2e7d32">Republishes to ludo.events.&lt;session_id&gt;</text>

<!-- ═══ ROW 12 — Drivers (#12, orange) y=578 ═══ -->
<rect x="20" y="578" width="430" height="38" rx="4" fill="#fff3e0" stroke="#ffa726" stroke-width="1"/>
