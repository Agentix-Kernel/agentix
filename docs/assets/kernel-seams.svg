<!-- Title -->
<text x="490" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#212121">Agentix — The 13 Kernel Seams</text>

<!-- Column headers -->
<rect x="20" y="40" width="430" height="24" rx="4" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1"/>
<text x="235" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#3949ab">Kernel</text>
<rect x="530" y="40" width="430" height="24" rx="4" fill="#fce4ec" stroke="#f48fb1" stroke-width="1"/>
<text x="745" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2185b">App Implementation</text>

<!-- ═══ ROW 1 — Config (#1, grey) y=72 ═══ -->
<rect x="20" y="72" width="430" height="38" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
<text x="32" y="86" font-size="11" font-weight="bold" fill="#424242">KernelConfig base class</text>
<text x="32" y="99" font-size="10" fill="#616161">Frozen dataclass; env-var fallback resolution</text>
<line x1="450" y1="91" x2="528" y2="91" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#ah-grey)"/>
<circle cx="490" cy="91" r="14" fill="#9e9e9e"/>
<text x="490" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">1</text>
<rect x="530" y="72" width="430" height="38" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
<text x="542" y="86" font-size="11" font-weight="bold" fill="#424242">ResolvedConfig subclass</text>
<text x="542" y="99" font-size="10" fill="#616161">App appends ERP creds + per-customer registry</text>

<!-- ═══ ROW 2 — SafetyGate (#2, red) y=118 ═══ -->
<rect x="20" y="118" width="430" height="38" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<text x="32" y="132" font-size="11" font-weight="bold" fill="#c62828">SafetyGate middleware slot</text>
<text x="32" y="145" font-size="10" fill="#c62828">rollback / _resolve_contract / _derive_verifier_fields</text>
<line x1="450" y1="137" x2="528" y2="137" stroke="#ef5350" stroke-width="1.5" marker-end="url(#ah-red)"/>
<circle cx="490" cy="137" r="14" fill="#ef5350"/>
<text x="490" y="141" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">2</text>
<rect x="530" y="118" width="430" height="38" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<text x="542" y="132" font-size="11" font-weight="bold" fill="#c62828">OdooSafetyGate subclass</text>
<text x="542" y="145" font-size="10" fill="#c62828">xmlid-scoped rollback; rename-map memory</text>

<!-- ═══ ROW 3 — TerminationPolicy (#3, red) y=164 ═══ -->
<rect x="20" y="164" width="430" height="38" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<text x="32" y="178" font-size="11" font-weight="bold" fill="#c62828">TerminationPolicy protocol</text>
<text x="32" y="191" font-size="10" fill="#c62828">observe(turn) + terminal_message(turn)</text>
<line x1="450" y1="183" x2="528" y2="183" stroke="#ef5350" stroke-width="1.5" marker-end="url(#ah-red)"/>
<circle cx="490" cy="183" r="14" fill="#ef5350"/>
<text x="490" y="187" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">3</text>
<rect x="530" y="164" width="430" height="38" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<text x="542" y="178" font-size="11" font-weight="bold" fill="#c62828">MigrationTerminationPolicy</text>
<text x="542" y="191" font-size="10" fill="#c62828">Terminate once all requested models loaded</text>

<!-- ═══ ROW 4 — DispatchGuard (#4, red) y=210 ═══ -->
<rect x="20" y="210" width="430" height="38" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<text x="32" y="224" font-size="11" font-weight="bold" fill="#c62828">DispatchGuard callable</text>
<text x="32" y="237" font-size="10" fill="#c62828">Pre-execution veto; None = allow, result = refuse</text>
<line x1="450" y1="229" x2="528" y2="229" stroke="#ef5350" stroke-width="1.5" marker-end="url(#ah-red)"/>
<circle cx="490" cy="229" r="14" fill="#ef5350"/>
