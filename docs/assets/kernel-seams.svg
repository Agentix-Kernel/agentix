<circle cx="490" cy="643" r="14" fill="#ffa726" opacity="0.7"/>
<text x="490" y="647" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">13</text>
<rect x="530" y="624" width="430" height="38" rx="4" fill="#fff3e0" stroke="#ffa726" stroke-width="1" stroke-dasharray="5,3"/>
<text x="542" y="638" font-size="11" font-weight="bold" fill="#e65100">Record census</text>
<text x="542" y="651" font-size="10" fill="#e65100">Deterministic key; redelivered writes become no-op</text>

