<text x="490" y="509" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">10</text>
<rect x="530" y="486" width="430" height="38" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
<text x="542" y="500" font-size="11" font-weight="bold" fill="#2e7d32">LudoSqliteStore</text>
<text x="542" y="513" font-size="10" fill="#2e7d32">Adds diagnoses + applied_memory_rules tables</text>

<!-- ═══ ROW 11 — Events (#11, green) y=532 ═══ -->
<rect x="20" y="532" width="430" height="38" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
