<rect x="530" y="578" width="430" height="38" rx="4" fill="#fff3e0" stroke="#ffa726" stroke-width="1"/>
<text x="542" y="592" font-size="11" font-weight="bold" fill="#e65100">agentix-driver-odoo (type="erp")</text>
<text x="542" y="605" font-size="10" fill="#e65100">Session-leased; vault-decrypted creds per job</text>

<!-- ═══ ROW 13 — Idempotency (#13, orange, dashed = design seam) y=624 ═══ -->
