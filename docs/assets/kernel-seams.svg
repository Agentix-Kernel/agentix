<text x="32" y="421" font-size="10" fill="#1565c0">Bundle roots; name+description surfaced cheaply</text>
<line x1="450" y1="413" x2="528" y2="413" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#ah-blue)"/>
<circle cx="490" cy="413" r="14" fill="#42a5f5"/>
<text x="490" y="417" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">8</text>
<rect x="530" y="394" width="430" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
