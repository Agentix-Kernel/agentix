<rect x="530" y="210" width="430" height="38" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<text x="542" y="224" font-size="11" font-weight="bold" fill="#c62828">OdooDispatchGuard</text>
<text x="542" y="237" font-size="10" fill="#c62828">Refuse drop_field on FK-protected columns</text>

<!-- ═══ ROW 5 — Tool (#5, blue) y=256 ═══ -->
<rect x="20" y="256" width="430" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<text x="32" y="270" font-size="11" font-weight="bold" fill="#1565c0">Tool protocol + ToolRegistry</text>
<text x="32" y="283" font-size="10" fill="#1565c0">name / description / input_schema / async call()</text>
<line x1="450" y1="275" x2="528" y2="275" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#ah-blue)"/>
<circle cx="490" cy="275" r="14" fill="#42a5f5"/>
<text x="490" y="279" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">5</text>
<rect x="530" y="256" width="430" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<text x="542" y="270" font-size="11" font-weight="bold" fill="#1565c0">~40 domain tools</text>
<text x="542" y="283" font-size="10" fill="#1565c0">extract · load · discover · pin · diagnose · rollback …</text>

<!-- ═══ ROW 6 — ToolContext (#6, blue) y=302 ═══ -->
<rect x="20" y="302" width="430" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<text x="32" y="316" font-size="11" font-weight="bold" fill="#1565c0">ToolContext injection</text>
<text x="32" y="329" font-size="10" fill="#1565c0">ctx.require_source() / ctx.require_target() — opaque</text>
