<rect x="530" y="348" width="430" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<text x="542" y="362" font-size="11" font-weight="bold" fill="#1565c0">odoo.com hosts · odoo-bin binary</text>
<text x="542" y="375" font-size="10" fill="#1565c0">ludo/port-spike- branch namespace</text>

<!-- ═══ ROW 8 — Skills (#8, blue) y=394 ═══ -->
