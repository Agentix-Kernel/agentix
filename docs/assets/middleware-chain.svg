<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="Helvetica, Arial, sans-serif">
<rect width="980" height="660" fill="#ffffff"/>

<defs>
  <marker id="ah" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#616161"/>
  </marker>
  <marker id="ah-seam" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#ffa726"/>
  </marker>
</defs>

<!-- Title -->
<text x="490" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#212121">Agentix — Middleware Chain</text>
<text x="490" y="44" text-anchor="middle" font-size="11" fill="#616161">Outside-in: layer 1 is outermost. Only slot 9 (MemoryMaintain) is app-supplied. Dispatcher is innermost.</text>

<!-- "outer" label -->
<text x="36" y="80" text-anchor="middle" font-size="9" fill="#9e9e9e" font-style="italic">outer</text>

<!-- ═══ ROW 1 — TrajectoryCapture (observability, green) y=88 ═══ -->
<rect x="60" y="88" width="860" height="38" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
<circle cx="92" cy="107" r="13" fill="#66bb6a"/>
<text x="92" y="111" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">1</text>
<text x="115" y="102" font-size="12" font-weight="bold" fill="#2e7d32">TrajectoryCapture</text>
<text x="115" y="116" font-size="10" fill="#2e7d32">Outermost — mirrors turn to object store (one JSON/turn) + turns FTS; full trajectory replayable</text>
<text x="910" y="111" text-anchor="end" font-size="9" fill="#66bb6a" font-style="italic">observability</text>

<!-- arrow 1→2 -->
<line x1="490" y1="126" x2="490" y2="139" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══ ROW 2 — CostTracking (budget, blue) y=142 ═══ -->
<rect x="60" y="142" width="860" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<circle cx="92" cy="161" r="13" fill="#42a5f5"/>
<text x="92" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">2</text>
<text x="115" y="156" font-size="12" font-weight="bold" fill="#1565c0">CostTracking</text>
<text x="115" y="170" font-size="10" fill="#1565c0">Telemetry only: stamps turn.cost_usd + cache-read ratio; real recording happens at the call boundary</text>
<text x="910" y="165" text-anchor="end" font-size="9" fill="#42a5f5" font-style="italic">budget</text>

<!-- arrow 2→3 -->
<line x1="490" y1="180" x2="490" y2="193" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══ ROW 3 — TokenBudget (budget, blue) y=196 ═══ -->
<rect x="60" y="196" width="860" height="38" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
<circle cx="92" cy="215" r="13" fill="#42a5f5"/>
<text x="92" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">3</text>
<text x="115" y="210" font-size="12" font-weight="bold" fill="#1565c0">TokenBudget</text>
<text x="115" y="224" font-size="10" fill="#1565c0">Money-cap enforcer: warn at 80%, compress before abort, clean abort on ceiling</text>
<text x="910" y="219" text-anchor="end" font-size="9" fill="#42a5f5" font-style="italic">budget</text>

<!-- arrow 3→4 -->
<line x1="490" y1="234" x2="490" y2="247" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══ ROW 4 — ToolCallCountCap (circuit breaker, amber) y=250 ═══ -->
<rect x="60" y="250" width="860" height="38" rx="4" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
<circle cx="92" cy="269" r="13" fill="#ffb300"/>
<text x="92" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">4</text>
<text x="115" y="264" font-size="12" font-weight="bold" fill="#f57f17">ToolCallCountCap</text>
<text x="115" y="278" font-size="10" fill="#f57f17">Thrash circuit breaker: same tool called N times total across the session</text>
<text x="910" y="273" text-anchor="end" font-size="9" fill="#ffb300" font-style="italic">circuit breakers</text>

<!-- arrow 4→5 -->
<line x1="490" y1="288" x2="490" y2="301" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══ ROW 5 — LoopDetection (circuit breaker, amber) y=304 ═══ -->
<rect x="60" y="304" width="860" height="38" rx="4" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
<circle cx="92" cy="323" r="13" fill="#ffb300"/>
<text x="92" y="327" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">5</text>
<text x="115" y="318" font-size="12" font-weight="bold" fill="#f57f17">LoopDetection</text>
<text x="115" y="332" font-size="10" fill="#f57f17">Stuck-agent breaker: same tool + same args N times in a row, and repeated-behaviour patterns</text>
<text x="910" y="327" text-anchor="end" font-size="9" fill="#ffb300" font-style="italic">circuit breakers</text>

<!-- arrow 5→6 -->
<line x1="490" y1="342" x2="490" y2="355" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══ ROW 6 — Retry (resilience, grey) y=358 ═══ -->
<rect x="60" y="358" width="860" height="38" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
<circle cx="92" cy="377" r="13" fill="#9e9e9e"/>
<text x="92" y="381" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">6</text>
<text x="115" y="372" font-size="12" font-weight="bold" fill="#424242">Retry</text>
<text x="115" y="386" font-size="10" fill="#424242">Bounded jittered backoff for LlmRateLimit / LlmUnavailable; LlmInvalidRequest bails; tool errors not retried here</text>
<text x="910" y="381" text-anchor="end" font-size="9" fill="#9e9e9e" font-style="italic">resilience</text>

<!-- arrow 6→7 -->
<line x1="490" y1="396" x2="490" y2="409" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══ ROW 7 — DanglingToolCall (resilience, grey) y=412 ═══ -->
<rect x="60" y="412" width="860" height="38" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
<circle cx="92" cy="431" r="13" fill="#9e9e9e"/>
<text x="92" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">7</text>
<text x="115" y="426" font-size="12" font-weight="bold" fill="#424242">DanglingToolCall</text>
<text x="115" y="440" font-size="10" fill="#424242">Heals orphaned tool_use without tool_result before the next LLM call (stream crash / partial resume)</text>
<text x="910" y="435" text-anchor="end" font-size="9" fill="#9e9e9e" font-style="italic">resilience</text>

<!-- arrow 7→8 -->
<line x1="490" y1="450" x2="490" y2="463" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══ ROW 8 — SafetyGateMarker (safety, red) y=466 ═══ -->
<rect x="60" y="466" width="860" height="38" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<circle cx="92" cy="485" r="13" fill="#ef5350"/>
<text x="92" y="489" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">8</text>
<text x="115" y="480" font-size="12" font-weight="bold" fill="#c62828">SafetyGateMarker</text>
<text x="115" y="494" font-size="10" fill="#c62828">Slot holder — real enforcement (dry-run / verifier / rollback) is per-tool SafetyGate (seam #2)</text>
<text x="910" y="489" text-anchor="end" font-size="9" fill="#ef5350" font-style="italic">safety</text>

<!-- arrow 8→9 (orange — entering app seam territory) -->
<line x1="490" y1="504" x2="490" y2="519" stroke="#ffa726" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah-seam)"/>

<!-- ═══ ROW 9 — MemoryMaintain (APP SEAM, orange dashed) y=522 ═══ -->
<rect x="60" y="522" width="860" height="38" rx="4" fill="#fff3e0" stroke="#ffa726" stroke-width="1.5" stroke-dasharray="5,3"/>
<circle cx="92" cy="541" r="13" fill="#ffa726"/>
<text x="92" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">9</text>
<text x="115" y="536" font-size="12" font-weight="bold" fill="#e65100">MemoryMaintain</text>
<text x="115" y="550" font-size="10" fill="#e65100">App-supplied (seam #9): episodic distillation loop (ingest → lint → reconcile → promote) at session end</text>
<text x="910" y="545" text-anchor="end" font-size="9" fill="#ffa726" font-style="italic">app seam</text>

<!-- arrow 9→Dispatcher -->
<line x1="490" y1="560" x2="490" y2="577" stroke="#616161" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- "inner" label -->
<text x="36" y="601" text-anchor="middle" font-size="9" fill="#9e9e9e" font-style="italic">inner</text>

<!-- ═══ DISPATCHER (innermost, indigo) y=580 ═══ -->
<rect x="60" y="580" width="860" height="40" rx="4" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5"/>
<text x="490" y="596" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Dispatcher</text>
<text x="490" y="611" text-anchor="middle" font-size="10" fill="#3949ab">LLM loop — build request (ContextManager), call driver, dispatch tool calls, append results, repeat</text>

<!-- ═══ LEGEND ═══ -->
<rect x="60" y="632" width="860" height="22" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
<rect x="72" y="639" width="10" height="10" rx="2" fill="#66bb6a"/>
<text x="87" y="648" font-size="9" fill="#424242">Observability</text>
<rect x="172" y="639" width="10" height="10" rx="2" fill="#42a5f5"/>
<text x="187" y="648" font-size="9" fill="#424242">Budget</text>
<rect x="248" y="639" width="10" height="10" rx="2" fill="#ffb300"/>
<text x="263" y="648" font-size="9" fill="#424242">Circuit Breakers</text>
<rect x="368" y="639" width="10" height="10" rx="2" fill="#9e9e9e"/>
<text x="383" y="648" font-size="9" fill="#424242">Resilience</text>
<rect x="448" y="639" width="10" height="10" rx="2" fill="#ef5350"/>
<text x="463" y="648" font-size="9" fill="#424242">Safety</text>
<rect x="516" y="639" width="10" height="10" rx="2" fill="#ffa726" stroke="#ffa726" stroke-width="1" stroke-dasharray="3,2"/>
<text x="531" y="648" font-size="9" fill="#424242">App Seam (dashed)</text>
<rect x="650" y="639" width="10" height="10" rx="2" fill="#3949ab"/>
<text x="665" y="648" font-size="9" fill="#424242">Dispatcher (innermost)</text>
</svg>
